<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fondo con bordes redondeados (estilo iOS/Android moderno) -->
  <rect width="1024" height="1024" rx="220" fill="url(#mainGrad)" />

  <!-- Círculo de acento sutil -->
  <circle cx="512" cy="512" r="400" fill="white" fill-opacity="0.03" />

  <!-- Logo de Envíos RH / Renace.tech -->
  <g transform="translate(256, 256) scale(21.33)" filter="url(#glow)">
    <!-- Icono de Caja Tecnológica -->
    <path d="M12 2L3 7v10l9 5 9-5V7l-9-5z" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M12 22V12" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M21 7l-9 5-9-5" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M12 7l9-5" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
    <path d="M12 7L3 2" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- Símbolo de "R" estilizada sutil dentro de la estructura -->
    <path d="M10 14h4v2h-4z" fill="#60a5fa" fill-opacity="0.5"/>
  </g>

  <!-- Texto de marca en la base (Opcional, mejor dejar solo el símbolo para iconos) -->
  <text x="512" y="900" font-family="Arial, sans-serif" font-weight="bold" font-size="60" text-anchor="middle" fill="#60a5fa" letter-spacing="10">RENACE</text>
</svg>
